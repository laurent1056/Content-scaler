<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Content Scaler — Configure your video generation pipeline and download a project.json in minutes.">
  <title>Content Scaler — Video Pipeline Configurator</title>

  <!-- Favicon via SVG data URI -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23f0c040'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' font-size='20' font-weight='900' font-family='system-ui' fill='%230d1117'>C</text></svg>">

  <!-- SheetJS from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-logo">
      <div class="app-logo-mark">C</div>
      <div class="app-logo-text">Content <span>Scaler</span></div>
    </div>
    <div class="app-tagline">Video Pipeline Configurator · GitHub Pages</div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Wizard Panel -->
    <div class="wizard-panel">

      <!-- Progress -->
      <div class="progress-container">
        <div class="progress-label">
          <span id="progress-text">Step 1 of 8 — Identity</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Step dots -->
      <div class="step-dots" id="step-dots"></div>

      <!-- Step content -->
      <div class="step-content" id="step-content">
        <!-- Rendered by wizard.js -->
      </div>

      <!-- Navigation -->
      <div class="wizard-nav">
        <button class="btn btn-ghost" id="btn-prev">← Back</button>
        <button class="btn btn-primary" id="btn-next">Next →</button>
      </div>

    </div>

    <!-- Preview Panel -->
    <aside class="preview-panel">
      <div class="preview-header">Live Preview</div>
      <div class="preview-canvas-wrapper">
        <canvas id="preview-canvas"></canvas>
        <div class="preview-label">
          270 × 480 px &nbsp;·&nbsp; Scaled 1080 × 1920<br>
          Updates as you type
        </div>
      </div>
    </aside>

  </main>

  <!-- ── Footer ─────────────────────────────────────────────────────────── -->
  <footer class="app-footer">
    Content Scaler &nbsp;·&nbsp;
    <a href="https://github.com/laurent1056/Content-scaler" target="_blank" rel="noopener">GitHub</a>
    &nbsp;·&nbsp;
    Python backend:&nbsp;
    <a href="https://github.com/laurent1056/the-magisterium" target="_blank" rel="noopener">the-magisterium</a>
  </footer>

</div>

<!-- Scripts (order matters: schema → preview → wizard) -->
<script src="schema.js"></script>
<script src="preview.js"></script>
<script src="wizard.js"></script>

</body>
</html>
